name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from package.json's `packageManager` field
      # (pnpm/action-setup rejects duplicate version specifiers).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Smoke — CLI doctor
        run: node packages/cli/dist/index.js doctor --json

      - name: Smoke — Markdown dry-run on docs/
        run: |
          node packages/cli/dist/index.js sync markdown \
            --path docs \
            --subject repo:smaramwbc/statewave-connectors \
            --dry-run \
            --json | head -60

      - name: Smoke — every available connector resolves via the CLI
        # `cli test --connector X` loads each connector's module and confirms
        # its public factory is exported. No network required. Catches
        # broken `package.json#exports` or missing tarball files that pure
        # vitest runs (which import from src/) wouldn't notice.
        run: |
          for c in github markdown slack n8n zapier discord zendesk intercom freshdesk notion mcp; do
            node packages/cli/dist/index.js test --connector "$c" --json
          done

      - name: Smoke — pnpm pack on every publishable package
        run: |
          rm -rf tarballs
          mkdir -p tarballs
          pnpm pack:all
          ls -la tarballs

      - name: Smoke — install tarballs into a fresh sandbox
        run: |
          # Install every shipped connector's tarball into a fresh project to
          # prove the published shape resolves end-to-end (exports, types,
          # bin entries). Catches publish-time package.json#exports
          # regressions that vitest (which imports from src/) cannot see.
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-core-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-github-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-markdown-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-slack-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-n8n-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-zapier-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-discord-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-zendesk-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-intercom-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-freshdesk-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-connectors-notion-*.tgz \
            "$GITHUB_WORKSPACE"/tarballs/statewavedev-mcp-server-*.tgz
          node --input-type=module -e '
            const checks = [
              ["@statewavedev/connectors-github", "createGithubConnector"],
              ["@statewavedev/connectors-markdown", "createMarkdownConnector"],
              ["@statewavedev/connectors-slack", "createSlackConnector"],
              ["@statewavedev/connectors-n8n", "createN8nConnector"],
              ["@statewavedev/connectors-zapier", "formatZapToEpisode"],
              ["@statewavedev/connectors-discord", "createDiscordConnector"],
              ["@statewavedev/connectors-zendesk", "createZendeskConnector"],
              ["@statewavedev/connectors-intercom", "createIntercomConnector"],
              ["@statewavedev/connectors-freshdesk", "createFreshdeskConnector"],
              ["@statewavedev/connectors-notion", "createNotionConnector"],
              ["@statewavedev/mcp-server", "STATEWAVE_MCP_TOOLS"],
            ];
            for (const [pkg, name] of checks) {
              const mod = await import(pkg);
              if (mod[name] === undefined) {
                console.error("FAIL: " + pkg + " missing export " + name);
                process.exit(1);
              }
              console.log("ok: " + pkg + " exports " + name);
            }
          '
