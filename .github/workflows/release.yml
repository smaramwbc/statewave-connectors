name: Release

# Provenance-ready release workflow.
#
# Today this workflow is provided in **dry-run** form: it builds, typechecks,
# tests, packs, and prints what *would* publish, but never actually pushes
# tarballs to npm. Flip the dry-run gate (see `RELEASE_DRY_RUN` below) once an
# `NPM_TOKEN` secret has been added and the maintainers are ready to ship.
#
# When publishing is enabled the job uses `--provenance`, which requires:
#   - `permissions: id-token: write` (declared below) so npm can verify the OIDC token
#   - the package's `publishConfig.provenance: true` (already set in every real package)
#
# The Changesets action handles version PRs and tag-driven publishes.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_dry_run:
        description: "Dry-run only — build/test/pack without publishing"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Default to dry-run on every push to main. Flip via the workflow_dispatch
      # input — or by setting `vars.RELEASE_DRY_RUN=false` at the repo level — once
      # NPM_TOKEN is configured and the maintainers are ready to publish.
      RELEASE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.release_dry_run || (vars.RELEASE_DRY_RUN || 'true') }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # pnpm version comes from package.json's `packageManager` field
      # (pnpm/action-setup rejects duplicate version specifiers).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

      - name: Lint + typecheck
        run: pnpm lint && pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Pack tarballs (always — verifies the publish surface)
        run: |
          rm -rf tarballs
          mkdir -p tarballs
          pnpm pack:all
          ls -la tarballs

      - name: Upload tarballs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: statewave-connectors-tarballs
          path: tarballs/*.tgz
          if-no-files-found: error

      - name: Dry-run notice
        if: env.RELEASE_DRY_RUN == 'true'
        run: |
          echo "::notice title=Release dry-run::This run only built, tested, and packed."
          echo "::notice::To publish: add NPM_TOKEN, set RELEASE_DRY_RUN=false (workflow_dispatch input or repo var), and re-run."

      # Publish each Phase-1 tarball directly via `npm publish`.
      #
      # We previously ran this through `changesets/action@v1` running
      # `pnpm run release` (= `changeset publish`). Changesets reported
      # "packages published successfully" but the registry showed all
      # six as 404. The wrapper hides per-package npm output and can
      # mis-report success when provenance generation or auth has a
      # subtle problem. Publishing tarballs directly gives us the real
      # npm output and real exit codes — same approach the SDK release
      # workflow uses successfully.
      - name: Publish Phase-1 packages to npm
        if: env.RELEASE_DRY_RUN != 'true'
        run: |
          set -euo pipefail
          for tarball in \
            ./tarballs/statewavedev-connectors-core-*.tgz \
            ./tarballs/statewavedev-mcp-server-*.tgz \
            ./tarballs/statewavedev-connectors-github-*.tgz \
            ./tarballs/statewavedev-connectors-markdown-*.tgz \
            ./tarballs/statewavedev-connectors-slack-*.tgz \
            ./tarballs/statewavedev-connectors-n8n-*.tgz \
            ./tarballs/statewavedev-connectors-zapier-*.tgz \
            ./tarballs/statewavedev-connectors-discord-*.tgz \
            ./tarballs/statewavedev-connectors-zendesk-*.tgz \
            ./tarballs/statewavedev-connectors-intercom-*.tgz \
            ./tarballs/statewavedev-connectors-freshdesk-*.tgz \
            ./tarballs/statewavedev-connectors-notion-*.tgz \
            ./tarballs/statewavedev-connectors-gmail-*.tgz \
            ./tarballs/statewavedev-connectors-config-*.tgz \
            ./tarballs/statewavedev-connectors-runner-*.tgz \
            ./tarballs/statewavedev-connectors-cli-*.tgz \
            ./tarballs/statewavedev-connectors-0.*.tgz; do
            spec=$(tar -xOf "$tarball" package/package.json | jq -r '.name + "@" + .version')
            # Skip if this exact name@version is already on the registry, so
            # re-running Release without a version bump is idempotent instead
            # of failing the whole job on E403.
            if npm view "$spec" version >/dev/null 2>&1; then
              echo "::notice title=Skip $spec::already published"
              continue
            fi
            echo "::group::publish $tarball ($spec)"
            npm publish "$tarball" --provenance --access public
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create the matching GitHub release from RELEASE_NOTES.md.
      #
      # The release tag and title come from the top-most `## v…` heading
      # in RELEASE_NOTES.md (e.g. `## v0.4.4 — Gmail connector …`); the
      # body is everything between that heading and the next one. We
      # only create the release when a real publish ran (skipped on
      # dry-run) and skip silently when the release for that tag
      # already exists, so a re-run that re-publishes nothing also
      # leaves the existing GitHub release untouched.
      - name: Create matching GitHub release
        if: env.RELEASE_DRY_RUN != 'true'
        run: |
          set -euo pipefail
          # Extract the top-most release-notes section.
          first_line=$(grep -m1 '^## v' RELEASE_NOTES.md || true)
          if [ -z "$first_line" ]; then
            echo "::warning::no `## v…` heading found in RELEASE_NOTES.md; skipping release creation"
            exit 0
          fi
          # `## v0.4.4 — Gmail connector (pull-mode)` → tag=v0.4.4, title rest
          tag=$(printf '%s' "$first_line" | awk '{print $2}')
          title=$(printf '%s' "$first_line" | sed -E 's/^## (v[^ ]+) — (.*)$/\1 — \2/')
          # Body: lines after the heading, until the next `## v…` line.
          awk -v section="^## ${tag} " 'BEGIN{p=0} $0 ~ section {p=1; next} /^## v/ && p {p=0} p' RELEASE_NOTES.md > /tmp/release-body.md
          if gh release view "$tag" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::notice title=Skip $tag::release already exists"
            exit 0
          fi
          echo "::notice title=Create $tag::creating GitHub release from RELEASE_NOTES.md"
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "$title" \
            --notes-file /tmp/release-body.md \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
