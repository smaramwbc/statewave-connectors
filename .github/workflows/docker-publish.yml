name: Docker publish

# Builds the Statewave MCP server image and pushes it to:
#   - Docker Hub: statewavedev/statewave-mcp-server
#   - GHCR:       ghcr.io/smaramwbc/statewave-mcp-server
#
# Multi-arch (linux/amd64, linux/arm64), with build provenance + SBOM, signed
# via Sigstore through actions/attest-build-provenance.
#
# Triggers:
#   - push to main                              → :latest, :sha-<short>
#   - push of v* tag                            → :X.Y.Z, :X.Y, :X (semver)
#   - push of @statewavedev/mcp-server@* tag    → :X.Y.Z, :X.Y, :X (semver,
#       changesets-style scoped tag)
#   - workflow_dispatch                         → manual rerun
#
# Required repo wiring (already configured at the repo level):
#   - vars.DOCKERHUB_USERNAME = statewavedev
#   - secrets.DOCKERHUB_TOKEN = a Docker Hub access token with R/W on the
#     statewavedev namespace

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "@statewavedev/mcp-server@*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            statewavedev/statewave-mcp-server
            ghcr.io/smaramwbc/statewave-mcp-server
          # Match both `vX.Y.Z` and the changesets-style scoped tag
          # `@statewavedev/mcp-server@X.Y.Z`. The `match` regex pulls the
          # semver portion out of either form.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=match,pattern=v(\d+\.\d+\.\d+),group=1
            type=match,pattern=@statewavedev/mcp-server@(\d+\.\d+\.\d+),group=1
            type=match,pattern=v(\d+\.\d+),group=1
            type=match,pattern=@statewavedev/mcp-server@(\d+\.\d+),group=1
          labels: |
            org.opencontainers.image.title=Statewave MCP Server
            org.opencontainers.image.description=Stdio MCP server exposing Statewave memory to MCP-compatible clients
            org.opencontainers.image.vendor=Statewave
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/smaramwbc/statewave-connectors
            org.opencontainers.image.documentation=https://statewave.ai

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest build provenance — Docker Hub
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/statewavedev/statewave-mcp-server
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance — GHCR
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/smaramwbc/statewave-mcp-server
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Sync packages/mcp-server/DOCKER.md to the Docker Hub repo description
      # on every default-branch build. Tolerates failure (continue-on-error) —
      # newer-style Docker Hub PATs only authorize image push, not repo
      # metadata writes, so this step 403s unless DOCKERHUB_TOKEN is replaced
      # with an Organization Access Token with `Repo Admin` scope. The image
      # publish above must not be gated on the description sync succeeding.
      - name: Update Docker Hub description
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: statewavedev/statewave-mcp-server
          short-description: "Stdio MCP server exposing Statewave memory to MCP clients"
          readme-filepath: ./packages/mcp-server/DOCKER.md
