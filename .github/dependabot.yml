version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    ignore:
      # Track the active Node.js LTS line. Update this rule when the
      # Dockerfiles bump to the next LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci):"

  - package-ecosystem: "docker"
    directories:
      - "/packages/mcp-server"
      - "/deploy/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    ignore:
      # Same rationale as @types/node above — stay on the active LTS line.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
