apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "connectors-runner.fullname" . }}
  labels:
    {{- include "connectors-runner.labels" . | nindent 4 }}
spec:
  # Multi-replica deployments REQUIRE a shared state kind. With
  # `kind = "file"`, the PVC is RWO and only one pod can mount it; with
  # replicaCount > 1, schedule a shared store (Postgres or Redis).
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "connectors-runner.selectorLabels" . | nindent 6 }}
  # Roll one-at-a-time so the in-flight cursor save on the old pod
  # finishes before the new pod takes over. Combined with the runner's
  # graceful shutdown (drain in-flight + close store), this gives
  # at-least-once cursor durability without an extra failover dance.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "connectors-runner.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rolling update when the ConfigMap or Secret content
        # changes — the runner reads them at boot, so a config edit
        # without a restart wouldn't take effect.
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}:{{ include "connectors-runner.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /sbin/tini
            - --
            - /app/node_modules/.bin/statewave-connectors
          args:
            - run
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "connectors-runner.secretName" . }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            # Tini + Node need a writable /tmp even though the rootfs
            # is read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "connectors-runner.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "connectors-runner.fullname" . }}-state
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
