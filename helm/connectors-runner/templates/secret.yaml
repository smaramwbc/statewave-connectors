{{- if not .Values.existingSecret -}}
# Inline-secrets path — renders Values.secrets into a Kubernetes Secret.
# Operators using External Secrets Operator / Sealed Secrets / SOPS
# should set existingSecret to that managed Secret's name and leave the
# Values.secrets map empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "connectors-runner.secretName" . }}
  labels:
    {{- include "connectors-runner.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
