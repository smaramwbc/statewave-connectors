apiVersion: v2
name: connectors-runner
description: |
  Statewave connectors runner — schedules every connector in your config,
  multiplexes push receivers under one HTTP server, exposes /healthz +
  /readyz + /metrics. Mounts the runner's TOML config from a ConfigMap
  and reads `${VAR}` references from a Secret.
type: application
version: 0.1.0
appVersion: "0.16.0"
home: https://statewave.ai
sources:
  - https://github.com/smaramwbc/statewave-connectors
keywords:
  - statewave
  - connectors
  - runner
  - daemon
  - prometheus
maintainers:
  - name: Statewave
    email: hello@statewave.ai
